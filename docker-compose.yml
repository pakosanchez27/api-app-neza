services:
  api:
    image: php:8.2-cli
    container_name: neza-turismo-api
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: https://www.api-neza.oraleweb.com
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: appturismo
      DB_USERNAME: neza_user
      DB_PASSWORD: neza_pass
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "apt-get update &&
             apt-get install -y
             git
             unzip
             libzip-dev
             libpng-dev
             libonig-dev
             libxml2-dev
             default-mysql-client &&
             docker-php-ext-install
             pdo_mysql
             mbstring
             zip
             exif
             pcntl &&
             php -r \"copy('https://getcomposer.org/installer', 'composer-setup.php');\" &&
             php composer-setup.php --install-dir=/usr/local/bin --filename=composer &&
             rm composer-setup.php &&
             composer install &&
             php artisan key:generate --force &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    container_name: neza-turismo-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: appturismo
      MYSQL_USER: neza_user
      MYSQL_PASSWORD: neza_pass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
